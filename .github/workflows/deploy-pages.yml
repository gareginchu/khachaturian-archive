name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore Fable tool
        run: dotnet tool restore

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund
        timeout-minutes: 3

      - name: Restore F# project (warm NuGet cache)
        working-directory: src
        run: dotnet restore --nologo
        timeout-minutes: 4

      - name: Compile F# -> JS (Fable)
        run: dotnet fable src -o output --noCache
        timeout-minutes: 5

      - name: Bundle with Vite
        run: npx vite build
        timeout-minutes: 3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
